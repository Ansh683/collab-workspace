<!DOCTYPE html>
<html>
<head>
    <title>Real-Time Editor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f7fa;
        }

        h2 {
            text-align: center;
            padding: 15px;
            background: #4CAF50;
            color: white;
            margin: 0;
        }

        .top-bar {
            padding: 15px;
            background: white;
            display: flex;
            gap: 10px;
            justify-content: center;
            border-bottom: 1px solid #ddd;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .left {
            flex: 2;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .right {
            flex: 1;
            max-width: 300px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 250px;
            border-radius: 8px;
            border: 1px solid #ccc;
            padding: 10px;
        }

        input {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 12px;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        ul {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            height: 180px;
            overflow-y: auto;
        }

        li {
            margin-bottom: 8px;
        }

        .toolbar {
            margin-bottom: 10px;
        }

        .toolbar select,
        .toolbar input {
            margin-right: 10px;
        }

        #status {
            text-align: center;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>

<body>

<h2>Real-Time Collaborative Editor</h2>

<div class="top-bar">
    <input type="text" id="username" placeholder="Enter your name">
    <input type="number" id="docId" placeholder="Enter Document ID">
    <button id="loadBtn">Load Document</button>
</div>

<p id="status"></p>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h3>Editor</h3>

        <!-- TOOLBAR -->
        <div class="toolbar">
            <label>Size:</label>
            <select id="fontSize">
                <option value="14px">Small</option>
                <option value="18px">Medium</option>
                <option value="24px">Large</option>
            </select>

            <label>Color:</label>
            <input type="color" id="fontColor">
        </div>

        <textarea id="editor"></textarea>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h3>Active Users</h3>
        <ul id="users"></ul>

        <h3>Version History</h3>
        <ul id="versions"></ul>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        let stompClient = null;
        let currentDocId = null;
        let typingTimeout;

        document.getElementById("loadBtn").addEventListener("click", loadDocument);

        // TEXT FORMATTING
        document.getElementById("fontSize").addEventListener("change", function () {
            document.getElementById("editor").style.fontSize = this.value;
        });

        document.getElementById("fontColor").addEventListener("input", function () {
            document.getElementById("editor").style.color = this.value;
        });

        function connect() {
            let socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function () {
                console.log("Connected");

                stompClient.subscribe('/topic/users', function (message) {
                    let users = JSON.parse(message.body);
                    let list = document.getElementById("users");
                    list.innerHTML = "";

                    users.forEach(user => {
                        let li = document.createElement("li");
                        li.innerText = user;
                        list.appendChild(li);
                    });
                });

                stompClient.subscribe('/topic/documents', function (message) {
                    let data = JSON.parse(message.body);

                    if (data.documentId == currentDocId) {
                        document.getElementById("editor").value = data.content;
                        document.getElementById("status").innerText =
                            data.username + " is editing...";
                    }
                });

                stompClient.subscribe('/topic/typing', function (message) {
                    let data = JSON.parse(message.body);

                    if (data.documentId == currentDocId) {
                        let status = document.getElementById("status");

                        status.innerText = data.username + " is typing...";

                        clearTimeout(typingTimeout);
                        typingTimeout = setTimeout(() => {
                            status.innerText = "";
                        }, 1500);
                    }
                });
            });
        }

        function loadDocument() {
            let id = document.getElementById("docId").value;
            let username = document.getElementById("username").value;

            currentDocId = id;

            if (username) {
                stompClient.send("/app/join", {}, JSON.stringify({
                    username: username
                }));
            }

            fetch(`/documents/${id}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("editor").value = data.content;
                });

            loadVersions();
        }

        function loadVersions() {
            if (!currentDocId) return;

            fetch(`/documents/${currentDocId}/versions`)
                .then(res => res.json())
                .then(data => {
                    let list = document.getElementById("versions");
                    list.innerHTML = "";

                    data.forEach(version => {
                        let li = document.createElement("li");

                        li.innerText =
                            `V${version.id} | ${version.username}`;

                        let btn = document.createElement("button");
                        btn.innerText = "Restore";
                        btn.style.backgroundColor = "#2196F3";

                        btn.addEventListener("click", function () {
                            restoreVersion(version.id);
                        });

                        li.appendChild(btn);
                        list.appendChild(li);
                    });
                });
        }

        function restoreVersion(versionId) {
            fetch(`/documents/${currentDocId}/restore/${versionId}`, {
                method: "PUT"
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("editor").value = data.content;
                loadVersions();
            });
        }

        function sendUpdate(content) {
            let username = document.getElementById("username").value;

            if (!currentDocId || !username) return;

            stompClient.send("/app/edit", {}, JSON.stringify({
                documentId: currentDocId,
                content: content,
                username: username
            }));
        }

        document.getElementById("editor").addEventListener("input", function () {
            let content = this.value;

            sendUpdate(content);

            let username = document.getElementById("username").value;

            if (username && currentDocId) {
                stompClient.send("/app/typing", {}, JSON.stringify({
                    documentId: currentDocId,
                    username: username
                }));
            }
        });

        window.addEventListener("beforeunload", function () {
            let username = document.getElementById("username").value;

            if (username) {
                stompClient.send("/app/leave", {}, JSON.stringify({
                    username: username
                }));
            }
        });

        connect();
    });
</script>

</body>
</html>
